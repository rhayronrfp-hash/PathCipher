<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>PathCipher</title>
  <link rel='stylesheet' href=Css/topbar-geral.css>
  <link rel='stylesheet' href=Css/canvas.css>
  <link rel='stylesheet' href=Css/sidebar.css>
  <link rel='stylesheet' href=Css/mobile.css>
  <link rel='stylesheet' href='Css/bottombar.css'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">

  <aside class="sidebar">
  
  <div class="sidebar-topo">
    <img src="Assets/Logo/Logo.png" alt='logo PathCipher' class='logo'>
    <span class='nome-app'>PathCipher</span>
  </div>
  <div class='side-baixo'>    
    <div class="side">

        <button class="side-icon" title="Fluxo">
          <img src="Assets/Icons/Main.png" alt="Fluxo">
        </button>
      
        <button class="side-icon" title="Pastas">
          <img src="Assets/Icons/Project.png" alt="Pastas">
        </button>
      
        <button class="side-icon" title="Salvar">
          <img src="Assets/Icons/Books.png" alt="Salvar">
        </button>
      
        <button class="side-icon" title="Compartilhar">
          <img src="Assets/Icons/Share.png" alt="Compartilhar">
        </button>
      
        <button class="side-icon" title="Plugins">
          <img src="Assets/Icons/plugin.png" alt="Plugins">
        </button>
      
        <button class="side-icon" title="Configurações">
          <img src="Assets/Icons/config.png" alt="Configurações">
        </button>
    </div>
  
<div class="sidebar-blocos">

  <!-- Criptografia (Azul) -->
  <div class="categoria">
    <input type="checkbox" id="cat-criptografia" class="categoria-toggle" checked>
    <label for="cat-criptografia" class="categoria-header">
      <span class="dot dot-azul"></span>
      <span>Criptografia</span>
      <span class="categoria-arrow">▾</span>
    </label>
    <div class="categoria-blocos">

      <button class="bloco bloco-azul" data-type="aes">
        <img src="Assets/Icons/Icon8.png" alt="AES" class="bloco-icon">
        AES
      </button>

      <button class="bloco bloco-azul" data-type="rsa">
        <img src="Assets/Icons/Icon9.png" alt="RSA" class="bloco-icon">
        RSA
      </button>

      <button class="bloco bloco-azul" data-type="chacha20">
        <img src="Assets/Icons/Icon10.png" alt="ChaCha20" class="bloco-icon">
        ChaCha20
      </button>

    </div>
  </div>

  <!-- Hash (Vermelho) -->
  <div class="categoria">
    <input type="checkbox" id="cat-hash" class="categoria-toggle" checked>
    <label for="cat-hash" class="categoria-header">
      <span class="dot dot-vermelho"></span>
      <span>Hash</span>
      <span class="categoria-arrow">▾</span>
    </label>
    <div class="categoria-blocos">

      <button class="bloco bloco-vermelho" data-type="sha256">
        <img src="Assets/Icons/Icon11.png" alt="SHA-256" class="bloco-icon">
        SHA-256
      </button>

      <button class="bloco bloco-vermelho" data-type="sha512">
        <img src="Assets/Icons/Icon12.png" alt="SHA-512" class="bloco-icon">
        SHA-512
      </button>

      <button class="bloco bloco-vermelho" data-type="md5">
        <img src="Assets/Icons/Icon13.png" alt="MD5" class="bloco-icon">
        MD5
      </button>

    </div>
  </div>

  <!-- Codificação (Verde) -->
  <div class="categoria">
    <input type="checkbox" id="cat-codificacao" class="categoria-toggle" checked>
    <label for="cat-codificacao" class="categoria-header">
      <span class="dot dot-verde"></span>
      <span>Codificação</span>
      <span class="categoria-arrow">▾</span>
    </label>
    <div class="categoria-blocos">

      <button class="bloco bloco-verde" data-type="base64">
        <img src="Assets/Icons/Icon1.png" alt="Base64" class="bloco-icon">
        Base64
      </button>

      <button class="bloco bloco-verde" data-type="hex">
        <img src="Assets/Icons/Icon2.png" alt="Hex" class="bloco-icon">
        Hex
      </button>

      <button class="bloco bloco-verde" data-type="binario">
        <img src="Assets/Icons/Icon3.png" alt="Binário" class="bloco-icon">
        Binário
      </button>

      <button class="bloco bloco-verde" data-type="morse">
        <img src="Assets/Icons/Icon4.png" alt="Morse" class="bloco-icon">
        Morse
      </button>

      <button class="bloco bloco-verde" data-type="ascii">
        <img src="Assets/Icons/Icon5.png" alt="ASCII" class="bloco-icon">
        ASCII
      </button>

      <button class="bloco bloco-verde" data-type="urlencode">
        <img src="Assets/Icons/Icon6.png" alt="URL Encode" class="bloco-icon">
        URL Encode
      </button>

      <button class="bloco bloco-verde" data-type="unicode">
        <img src="Assets/Icons/Icon7.png" alt="Unicode" class="bloco-icon">
        Unicode
      </button>

    </div>
  </div>

  <!-- Clássicas |dps pensar no que adicionar aqui(Amarelo) -->
  <div class="categoria">
    <input type="checkbox" id="cat-classicas" class="categoria-toggle" checked>
    <label for="cat-classicas" class="categoria-header">
      <span class="dot dot-amarelo"></span>
      <span>Clássicas</span>
      <span class="categoria-arrow">▾</span>
    </label>
    <div class="categoria-blocos">

      <button class="bloco bloco-amarelo" data-type="rot13">
        <img src="Assets/Icons/Icon14.png" alt="ROT13" class="bloco-icon">
        ROT13
      </button>

      <button class="bloco bloco-amarelo" data-type="cesar">
        <img src="Assets/Icons/Icon15.png" alt="César" class="bloco-icon">
        César
      </button>

      <button class="bloco bloco-amarelo" data-type="vigenere">
        <img src="Assets/Icons/Icon16.png" alt="Vigenère" class="bloco-icon">
        Vigenère
      </button>

      <button class="bloco bloco-amarelo" data-type="atbash">
        <img src="Assets/Icons/Icon17.png" alt="Atbash" class="bloco-icon">
        Atbash
      </button>

    </div>
  </div>

</div>
      
    </div>

</aside>


  <div class="right-side">
    <header class="topbar">

  <div class="topbar-project">
    <span class="project-label">Projeto:</span>
    <span class="project-name">Novo Pipeline</span>
    <button class="lapis">
      <img src="Assets/Icons/lapis.png" alt="Editar">
    </button>
  </div>

  <div class="topbar-actions">
    
    <button class="setas" title="Desfazer">↺</button>
    <button class="setas" title="Refazer">↻</button>
    
    

<button class="btn-outline btn-group inverter" >Inverter</button>
  <button class="executar">Executar</button>



<div class="btn-group btn-roxo">
  <button class="btn-outline salvamento" >Salvar</button>
  <button class="dropdown-arrow" >▾</button>
</div>

  </div>

</header>
    




    
    <main class="canvas">
  <div id="fluxo-container" class="fluxo-container"></div>
    
</main>







<footer class="painel">

  <div class="cartao-painel">
    <div class="top-painel">
      <span>Entrada</span>
      <button class="painel-copy gambiarra">
        <img src="Assets/Icons/gambiarra.png" alt="Copiar">
      </button>
    </div>
    <textarea class="painel-texto" placeholder="WARNING!!! DO NOT USE UPPERCASE"></textarea>
    <div class="painel-bottom">
      <span>Tamanho: </span>
    </div>
  </div>


  <div class="cartao-painel">
    <div class="top-painel">
      <span>Resultado</span>
      <button class="painel-copy">
        <img src="Assets/Icons/Copy.png" alt="Copiar">
      </button>
    </div>
    <textarea class="painel-texto" id='saída' readonly>67 six seven</textarea>
    <div class="painel-bottom">
      <span>Tamanho: </span>
      <span>Tempo: </span>
      <span>Etapas: </span>
    </div>
  </div>

</footer>

  </div>

</div>
<script src='Js/Appearance.js'></script>
<script src='Js/logic.js'></script>
</body>
</html>
