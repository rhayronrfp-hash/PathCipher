<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>PathCipher</title>
  <link rel='stylesheet' href=Css/topbar-geral.css>
  <link rel='stylesheet' href=Css/canvas.css>
  <link rel='stylesheet' href=Css/sidebar.css>
  <link rel='stylesheet' href=Css/mobile.css>
  <link rel='stylesheet' href='Css/bottombar.css'>
  <link rel='stylesheet' href='Css/Aviso.css'>
  <link rel='stylesheet' href='Css/config.css'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">

  <aside class="sidebar">
  
  <div class="sidebar-topo">
    <img src="Assets/Logo/Logo.png" alt='logo PathCipher' class='logo'>
    <span class='nome-app'>PathCipher</span>
  </div>
  <div class='side-baixo'>    
    <div class="side">

        <button class="side-icon" title="Fluxo">
          <img src="Assets/Icons/Main.png" alt="Fluxo">
        </button>
      
        <button class="side-icon" title="Pastas">
          <img class='gambiarra-do-icone' src="Assets/Icons/Project.png" alt="Pastas">
        </button>
      
        <button class="side-icon" title="Salvar">
          <img src="Assets/Icons/Books.png" alt="Salvar">
        </button>
      
        <button class="side-icon" title="Compartilhar">
          <img src="Assets/Icons/Share.png" alt="Compartilhar">
        </button>
      
        <button class="side-icon" title="Plugins">
          <img src="Assets/Icons/plugin.png" alt="Plugins">
        </button>
      
        <button class="side-icon" data-page="Config">
          <img class='icone-config' src="Assets/Icons/config.png" alt="Configurações">
        </button>
    </div>
  
<div class="sidebar-blocos">

  <!-- Criptografia (Azul) -->
  <div class="categoria">
    <input type="checkbox" id="cat-criptografia" class="categoria-toggle" checked>
    <label for="cat-criptografia" class="categoria-header">
      <span class="dot dot-azul"></span>
      <span>Criptografia</span>
      <span class="categoria-arrow">▾</span>
    </label>
    <div class="categoria-blocos">

      <button class="bloco bloco-azul" data-type="aes">
        <img src="Assets/Icons/Icon8(1).png" alt="AES" class="bloco-icon">
        AES
      </button>

      <button class="bloco bloco-azul" data-type="rsa">
        <img src="Assets/Icons/Icon9(1).png" alt="RSA" class="bloco-icon">
        RSA
      </button>

      <button class="bloco bloco-azul" data-type="chacha20">
        <img src="Assets/Icons/Icon10(1).png" alt="ChaCha20" class="bloco-icon">
        ChaCha20
      </button>

    </div>
  </div>

  <!-- Hash (Vermelho) -->
  <div class="categoria">
    <input type="checkbox" id="cat-hash" class="categoria-toggle" checked>
    <label for="cat-hash" class="categoria-header">
      <span class="dot dot-vermelho"></span>
      <span>Hash</span>
      <span class="categoria-arrow">▾</span>
    </label>
    <div class="categoria-blocos">

      <button class="bloco bloco-vermelho" data-type="sha256">
        <img src="Assets/Icons/Icon11(1).png" alt="SHA-256" class="bloco-icon">
        SHA-256
      </button>

      <button class="bloco bloco-vermelho" data-type="sha512">
        <img src="Assets/Icons/Icon12(1).png" alt="SHA-512" class="bloco-icon">
        SHA-512
      </button>

      <button class="bloco bloco-vermelho" data-type="md5">
        <img src="Assets/Icons/Icon13(1).png" alt="MD5" class="bloco-icon">
        MD5
      </button>

    </div>
  </div>

  <!-- Codificação (Verde) -->
  <div class="categoria">
    <input type="checkbox" id="cat-codificacao" class="categoria-toggle" checked>
    <label for="cat-codificacao" class="categoria-header">
      <span class="dot dot-verde"></span>
      <span>Codificação</span>
      <span class="categoria-arrow">▾</span>
    </label>
    <div class="categoria-blocos">

      <button class="bloco bloco-verde" data-type="base64">
        <img src="Assets/Icons/Icon1(1).png" alt="Base64" class="bloco-icon">
        Base64
      </button>

      <button class="bloco bloco-verde" data-type="hex">
        <img src="Assets/Icons/Icon2(1).png" alt="Hex" class="bloco-icon">
        Hex
      </button>

      <button class="bloco bloco-verde" data-type="binario">
        <img src="Assets/Icons/Icon3(1).png" alt="Binário" class="bloco-icon">
        Binário
      </button>

      <button class="bloco bloco-verde" data-type="morse">
        <img src="Assets/Icons/Icon4(1).png" alt="Morse" class="bloco-icon">
        Morse
      </button>

      <button class="bloco bloco-verde" data-type="ascii">
        <img src="Assets/Icons/Icon5(1).png" alt="ASCII" class="bloco-icon">
        ASCII
      </button>

      <button class="bloco bloco-verde" data-type="urlencode">
        <img src="Assets/Icons/Icon6(1).png" alt="URL Encode" class="bloco-icon">
        URL Encode
      </button>

      <button class="bloco bloco-verde" data-type="unicode">
        <img src="Assets/Icons/Icon7(1).png" alt="Unicode" class="bloco-icon">
        Unicode
      </button>

    </div>
  </div>

  <!-- Clássicas |dps pensar no que adicionar aqui(Amarelo) -->
  <div class="categoria">
    <input type="checkbox" id="cat-classicas" class="categoria-toggle" checked>
    <label for="cat-classicas" class="categoria-header">
      <span class="dot dot-amarelo"></span>
      <span>Clássicas</span>
      <span class="categoria-arrow">▾</span>
    </label>
    <div class="categoria-blocos">

      <button class="bloco bloco-amarelo" data-type="rot13">
        <img src="Assets/Icons/Icon14(1).png" alt="ROT13" class="bloco-icon">
        ROT13
      </button>

      <button class="bloco bloco-amarelo" data-type="cesar">
        <img src="Assets/Icons/Icon15(1).png" alt="César" class="bloco-icon">
        César
      </button>

      <button class="bloco bloco-amarelo" data-type="vigenere">
        <img src="Assets/Icons/Icon16(1).png" alt="Vigenère" class="bloco-icon">
        Vigenère
      </button>

      <button class="bloco bloco-amarelo" data-type="atbash">
        <img src="Assets/Icons/Icon17(1).png" alt="Atbash" class="bloco-icon">
        Atbash
      </button>

    </div>
  </div>

</div>
      
    </div>

</aside>


  <div class="right-side">
    <header class="topbar">
      
      
  <div class="topbar-project">
    
  <label for="project-name" id="edita-name">Projeto:</label>
  <input id="project-name" type="text" maxlength="50" value="pipeline" readonly>
  
  <button class="lapis" type="button">
    <img src="Assets/Icons/lapis.png" alt="Editar">
  </button>
  
  
</div>

  <div class="topbar-actions">

    <button class="setas" title="Desfazer">
      <img src='Assets/Icons/seta.png'>
    </button>
    
    <button class="setas" title="Refazer">
      <img src='Assets/Icons/seta2.png'>
    </button>
    
<button class="btn-outline btn-group inverter">Descriptografia</button>
  
  <button class="executar">Executar</button>

<div class="btn-group btn-roxo">
  <button class="btn-outline salvamento" >Salvar</button>
  <button class="dropdown-arrow" >▾</button>
</div>
  </div>

</header>
    
    <main class="canvas">
  <div id="fluxo-container" class="fluxo-container"></div>
    <button id="limpar-pipeline"><img src='Assets/Icons/reset.png'></button>
</main>

<footer class="painel">

  <div class="cartao-painel">
    <div class="top-painel">
      <span>Criptografar</span>
      <button class="painel-copy gambiarra">
        <img src="Assets/Icons/gambiarra.png" alt="Copiar">
      </button>
    </div>
    <textarea class="painel-texto" placeholder="digite aqui"></textarea>
  </div>

  <div class="cartao-painel">
    <div class="top-painel">
      <span>Criptografia</span>
      <button class="painel-copy">
        <img src="Assets/Icons/Copy.png" alt="Copiar">
      </button>
    </div>
    <textarea class="painel-texto" id='saída' readonly placeholder="veja o resultado aqui"></textarea>
  </div>
</footer>

  </div>
</div>

<div class="config-overlay"></div>

<div class="config-modal">

    <div class="config-container">
    <div class="ajustes-cabecalho">
      <h1>Configurações</h1> <button class="fechar-ajustes" type="button">X</button>
    </div>

    <div class="ajustes-respiro"></div>

    <div class="secao-ajustes">
      <div class="secao-titulo">
        <img src="Assets/Icons/Pintura.png" alt="">
        <span>Aparência</span>
      </div>

      <div class="cartao-ajuste">

    <div class="linha-opcao">

        <div class="lado-esquerdo">
            <img src="Assets/Icons/tema.png.png" alt="">
            <span>Tema</span>
        </div>

        <div class="opcoes-em-linha">

            <label class="opcao-bolinha">
                <input type="radio" name="tema">
                <span>Claro</span>
            </label>

            <label class="opcao-bolinha">
                <input type="radio" name="tema">
                <span>Escuro</span>
            </label>

            <label class="opcao-bolinha gambiarra4">
                <input type="radio" name="tema">
                <span>Sistema</span>
            </label>

        </div>

    </div>

</div>
    </div>

    <div class="secao-ajustes">
      <div class="secao-titulo">
        <img src="Assets/Icons/Configicon2.png" alt="">
        <span>Canvas</span>
      </div>

      <div class="cartao-ajuste">

    <div class="linha-opcao">

        <div class="lado-esquerdo">
            <img src="Assets/Icons/Config1.png" alt="">
            <span>Tamanho dos blocos</span>
        </div>

        <div class="opcoes-em-linha">

            <label class="opcao-bolinha">
                <input type="radio" name="tema">
                <span>pequeno</span>
            </label>

            <label class="opcao-bolinha gambiarra2">
                <input type="radio" name="tema">
                <span>normal</span>
            </label>

            <label class="opcao-bolinha gambiarra3">
                <input type="radio" name="tema">
                <span>grande</span>
            </label>

        </div>

    </div>

</div>

      <div class="cartao-ajuste">
        <div class="opcao-toggle">
          <div class="lado-esquerdo gambiarra-pra-alinhar-imagem-menu">
            <img src="Assets/Icons/Config2 (1).png" alt="">
            <span>Mostrar linhas do fluxo</span>
          </div>

          <label class="chave-switch">
            <input type="checkbox">
            <span class="alavanca"></span>
          </label>
        </div>
      </div>

      <div class="cartao-ajuste">
        <div class="opcao-toggle">
          <div class="lado-esquerdo gambiarra-pra-alinhar-imagem-menu">
            <img src="Assets/Icons/Config3.png" alt="">
            <span>Mostrar setas nas linhas</span>
          </div>

          <label class="chave-switch">
            <input type="checkbox">
            <span class="alavanca"></span>
          </label>
        </div>
      </div>

  

      <div class="cartao-ajuste">

    <div class="linha-opcao">

        <div class="lado-esquerdo gambiarra-pra-alinhar-imagem-menu2">
            <img src="Assets/Icons/Config5.png" alt="">
            <span>Distância entre blocos</span>
        </div>

        <div class="opcoes-em-linha">

            <label class="opcao-bolinha">
                <input type="radio" name="tema">
                <span>curto</span>
            </label>

            <label class="opcao-bolinha">
                <input type="radio" name="tema">
                <span>normal</span>
            </label>

            <label class="opcao-bolinha">
                <input type="radio" name="tema">
                <span>longo</span>
            </label>

        </div>

    </div>

</div>
    </div>

    <div class="area-salvar">
      <button class="botao-confirmar-ajustes" type="button">Salvar configurações</button>
    </div>
  </div>
</div>
  



<script src='Js/Appearance.js'></script>
<script src='Js/config.js'></script>
<script src='Js/crypto.js'></script>
<script src='Js/Logic.js'></script>
<script src='Js/Savelogic.js'></script>
<script src='Js/warn.js'></script>
<script src='Js/storage.js'></script>
</body>
</html>
